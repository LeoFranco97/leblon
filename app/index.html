<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Leblon · protótipo do app</title>
<meta name="description" content="Protótipo navegável do app Leblon: fluxo do usuário (Preciso agora / Agendar) e do prestador (serviços na hora / tipo de serviço)."/>
<meta name="theme-color" content="#FF4800"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#03014C;--ink2:#0A0838;--brand:#FF4800;--brand6:#E03F00;--tint:#FFF1EC;
  --paper:#fff;--mist:#F6F7FB;--line:#ECEDF4;--muted:#6A6A82;--text:#15132E;
  --ok:#1FB67A;--okt:#E9FBF3;--star:#FFB400;--blue:#2563eb;--warn:#FFF8E6;--warnk:#8a6d00;
  --r:18px;--ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:#22203f;color:var(--text);display:flex;justify-content:center;min-height:100vh}
h1,h2,h3,h4,.dp{font-family:'Inter Tight','Inter',sans-serif;letter-spacing:-.02em;color:var(--ink)}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
img{max-width:100%}
.ic{width:1em;height:1em;display:inline-block;vertical-align:-.13em;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.phone{width:100%;max-width:430px;background:var(--paper);min-height:100vh;position:relative;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5)}
@media(min-width:480px){body{padding:24px 0}.phone{min-height:auto;height:calc(100vh - 48px);max-height:920px;border-radius:42px;border:10px solid #0c0a26}}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 22px 4px;font-size:13px;font-weight:600;color:var(--ink);flex-shrink:0;background:var(--paper);z-index:6}
.statusbar.dark{color:#fff;background:transparent;position:absolute;left:0;right:0;top:0}
.statusbar .dots{display:flex;gap:6px;align-items:center}.statusbar .ic{width:15px;height:15px}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:92px;animation:fade .25s var(--ease)}
.screen.noscroll{padding-bottom:74px;overflow:hidden}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pad{padding:0 20px}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px 14px;position:sticky;top:0;background:var(--paper);z-index:4}
.topbar .back{width:38px;height:38px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;font-size:18px}
.topbar h2{font-size:19px;font-weight:700;flex:1}
.topbar .act{width:38px;height:38px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0}
.topbar .act .ic{width:19px;height:19px}
.row{display:flex;align-items:center;gap:12px}.between{justify-content:space-between}.wrap{flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--tint);color:var(--brand);font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;white-space:nowrap}
.chip.gray{background:var(--mist);color:var(--muted)}
.chip.ok{background:var(--okt);color:var(--ok)}
.chip.live{background:var(--okt);color:var(--ok)}
.chip.live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.verified{color:var(--blue);display:inline-flex}.verified .ic{width:14px;height:14px}
.stars{display:inline-flex;gap:1px;vertical-align:middle}
.muted{color:var(--muted)}.sm{font-size:13px}.xs{font-size:11px}.b{font-weight:700}.center{text-align:center}
.divider{height:1px;background:var(--line);margin:16px 0}
.sec-title{font-size:17px;font-weight:700;margin:22px 0 12px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:0 1px 2px rgba(3,1,76,.05)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter Tight';font-weight:600;font-size:16px;padding:15px 20px;border-radius:14px;width:100%;transition:transform .15s var(--ease),background .15s}
.btn .ic{width:18px;height:18px}.btn:active{transform:scale(.97)}
.btn-pri{background:var(--brand);color:#fff;box-shadow:0 6px 18px rgba(255,72,0,.3)}
.btn-pri:active{background:var(--brand6)}
.btn-out{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost{background:var(--mist);color:var(--ink)}
.btn-ok{background:var(--ok);color:#fff;box-shadow:0 6px 18px rgba(31,182,122,.3)}
.btn-danger{background:#fff;color:#d23b3b;border:1.5px solid #f3d2d2}
.btn-sm{padding:10px 16px;font-size:14px;width:auto;border-radius:11px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter Tight';font-weight:700;flex-shrink:0;background:linear-gradient(135deg,var(--brand),#ff9466)}
.av.xl{width:88px;height:88px;font-size:34px}.av.lg{width:64px;height:64px;font-size:24px}.av.md{width:48px;height:48px;font-size:18px}.av.sm{width:40px;height:40px;font-size:15px}
.av.b1{background:linear-gradient(135deg,#3b34c4,#6a63e6)}.av.b2{background:linear-gradient(135deg,#1FB67A,#5fd6a8)}
.av.b3{background:linear-gradient(135deg,#7c3aed,#b388ff)}.av.b4{background:linear-gradient(135deg,#2563eb,#6aa0ff)}
.av.b5{background:linear-gradient(135deg,#db2777,#f57ab6)}.av.b6{background:linear-gradient(135deg,#ea580c,#fdba74)}
/* bottom nav */
.botnav{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 6px 6px;z-index:20}
.navitem{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--muted);flex:1;padding-top:8px}
.navitem.active{color:var(--brand)}.navitem .ic{width:22px;height:22px}
.navitem .dotn{position:relative}
.navitem .dotn::after{content:"";position:absolute;top:-2px;right:-6px;width:8px;height:8px;border-radius:50%;background:var(--brand);border:1.5px solid #fff}
/* mode segment */
.modeseg{display:flex;background:var(--mist);border-radius:999px;padding:4px;gap:4px;margin:4px 20px 14px}
.modeseg button{flex:1;font-family:'Inter Tight';font-weight:600;font-size:14px;padding:10px;border-radius:999px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px}
.modeseg button .ic{width:16px;height:16px}
.modeseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(3,1,76,.12)}
.modeseg button.on.pro{color:var(--brand)}
/* home hero */
.homehead{background:linear-gradient(160deg,#1a1463,var(--ink));padding:48px 20px 58px;color:#fff;border-radius:0 0 28px 28px;position:relative;overflow:hidden}
.homehead::after{content:"";position:absolute;top:-40%;right:-10%;width:240px;height:240px;background:var(--brand);filter:blur(90px);opacity:.45;border-radius:50%}
.homehead>*{position:relative;z-index:2}
.homehead .loc{font-size:13px;opacity:.85;display:flex;align-items:center;gap:5px}
.homehead .loc .ic{width:15px;height:15px}
.homehead h1{color:#fff;font-size:24px;margin:6px 0 4px;font-weight:800}
.homehead p{opacity:.8;font-size:14px}
/* two big actions */
.bigacts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:-22px 20px 4px;position:relative;z-index:3}
.homehead h1{margin-bottom:6px}.homehead p{margin-bottom:2px}
.bigact{background:#fff;border-radius:20px;padding:18px 16px 16px;box-shadow:0 14px 30px rgba(3,1,76,.16);text-align:left;border:1px solid var(--line)}
.bigact:active{transform:scale(.97)}
.bigact .ico{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.bigact .ico .ic{width:24px;height:24px}
.bigact.now .ico{background:var(--brand);color:#fff}
.bigact.sched .ico{background:var(--ink);color:#fff}
.bigact h3{font-size:17px;margin-bottom:3px}
.bigact p{font-size:12px;color:var(--muted);line-height:1.35}
.bigact .tag{display:inline-block;margin-top:8px;font-size:10.5px;font-weight:700;letter-spacing:.03em}
.bigact.now .tag{color:var(--brand)}.bigact.sched .tag{color:var(--ink)}
/* category grid */
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.catitem{display:flex;flex-direction:column;align-items:center;gap:7px;padding:6px 2px}
.catitem .e{width:56px;height:56px;border-radius:17px;background:var(--tint);display:flex;align-items:center;justify-content:center;color:var(--brand);transition:transform .15s;position:relative}
.catitem .e .ic{width:25px;height:25px}
.catitem:active .e{transform:scale(.92)}
.catitem .e .nowdot{position:absolute;top:-3px;right:-3px;background:var(--ok);color:#fff;font-size:8px;font-weight:800;padding:2px 5px;border-radius:999px;border:2px solid #fff}
.catitem span{font-size:11px;font-weight:600;text-align:center;color:var(--text);line-height:1.2}
/* provider card */
.pcard{display:flex;gap:12px;padding:14px;border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;background:#fff;transition:transform .15s;align-items:center}
.pcard:active{transform:scale(.985)}
.pcard .meta{flex:1;min-width:0}
.pcard .nm{font-family:'Inter Tight';font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:5px}
.pcard .price{text-align:right;flex-shrink:0}
.pcard .price b{font-family:'Inter Tight';color:var(--ink);font-size:15px;display:block}
/* options */
.opt{border:1.5px solid var(--line);border-radius:14px;padding:15px;margin-bottom:10px;display:flex;align-items:center;gap:12px;font-weight:500;font-size:15px;transition:.15s;background:#fff;width:100%;text-align:left}
.opt:active{transform:scale(.985)}
.opt.sel{border-color:var(--brand);background:var(--tint)}
.opt .e{width:42px;height:42px;border-radius:12px;background:var(--tint);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt .e .ic{width:21px;height:21px}
.opt .meta{flex:1;min-width:0}.opt .meta .t{font-weight:700;font-family:'Inter Tight';color:var(--ink)}
.opt .meta .d{font-size:12.5px;color:var(--muted)}
.opt .arr{color:var(--muted);display:flex}.opt .arr .ic{width:18px;height:18px}
.opt .rdo{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.opt.sel .rdo{border-color:var(--brand);background:var(--brand);color:#fff}
.opt.sel .rdo .ic{width:13px;height:13px}
.opt:not(.sel) .rdo .ic{display:none}
/* fields */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:var(--text)}
.field input:focus,.field textarea:focus{border-color:var(--brand)}
/* day & slot chips */
.daysrow{display:flex;gap:9px;overflow-x:auto;padding-bottom:6px;margin:0 -20px;padding-left:20px;padding-right:20px}
.day{flex-shrink:0;width:60px;border:1.5px solid var(--line);border-radius:14px;padding:10px 4px;text-align:center;background:#fff}
.day:active{transform:scale(.96)}
.day.sel{border-color:var(--brand);background:var(--brand);color:#fff}
.day .dn{font-size:11px;font-weight:600;text-transform:uppercase;opacity:.7}
.day .dd{font-family:'Inter Tight';font-weight:800;font-size:20px;margin-top:2px}
.day.sel .dn{opacity:.9}
.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.slot{border:1.5px solid var(--line);border-radius:12px;padding:12px 4px;text-align:center;font-family:'Inter Tight';font-weight:600;font-size:14px;background:#fff;color:var(--ink)}
.slot:active{transform:scale(.96)}
.slot.sel{border-color:var(--brand);background:var(--brand);color:#fff}
.slot.off{opacity:.4;text-decoration:line-through;pointer-events:none}
/* searching radar */
.radar{width:200px;height:200px;margin:30px auto 10px;position:relative;display:flex;align-items:center;justify-content:center}
.radar .ring{position:absolute;border-radius:50%;border:2px solid var(--brand);opacity:0;animation:radar 2.4s var(--ease) infinite}
.radar .ring:nth-child(2){animation-delay:.8s}.radar .ring:nth-child(3){animation-delay:1.6s}
@keyframes radar{0%{width:54px;height:54px;opacity:.7}100%{width:200px;height:200px;opacity:0}}
.radar .core{width:64px;height:64px;border-radius:22px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(255,72,0,.45);z-index:2}
.radar .core .ic{width:32px;height:32px}
/* countdown ring (pro grab) */
.ringwrap{width:128px;height:128px;margin:8px auto 16px;position:relative}
.ringwrap svg{transform:rotate(-90deg)}
.ringwrap .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringwrap .lbl b{font-family:'Inter Tight';font-size:30px;color:var(--ink);line-height:1}
.ringwrap .lbl span{font-size:11px;color:var(--muted)}
/* status timeline */
.timeline{margin:6px 0}
.tl{display:flex;gap:13px;padding-bottom:18px;position:relative}
.tl:last-child{padding-bottom:0}
.tl::before{content:"";position:absolute;left:13px;top:26px;bottom:-4px;width:2px;background:var(--line)}
.tl:last-child::before{display:none}
.tl.done::before{background:var(--ok)}
.tl .dot{width:28px;height:28px;border-radius:50%;background:var(--mist);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:2;border:2px solid var(--paper)}
.tl .dot .ic{width:15px;height:15px}
.tl.done .dot{background:var(--ok);color:#fff}
.tl.active .dot{background:var(--brand);color:#fff;box-shadow:0 0 0 5px var(--tint)}
.tl .tt{font-family:'Inter Tight';font-weight:700;font-size:14.5px;color:var(--ink);padding-top:4px}
.tl.pending .tt{color:var(--muted);font-weight:600}
.tl .ts{font-size:12.5px;color:var(--muted)}
/* order card */
.ordercard{border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:12px;background:#fff;box-shadow:0 1px 2px rgba(3,1,76,.05)}
.ordercard .head{display:flex;gap:12px;align-items:center;margin-bottom:10px}
.ordercard .ico{width:44px;height:44px;border-radius:13px;background:var(--tint);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ordercard .ico .ic{width:22px;height:22px}
.st{font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap}
.st.searching{background:var(--tint);color:var(--brand)}
.st.awaiting{background:var(--warn);color:var(--warnk)}
.st.confirmed{background:var(--okt);color:var(--ok)}
.st.inprogress{background:#E8F0FF;color:var(--blue)}
.st.done{background:var(--okt);color:var(--ok)}
.st.paid{background:var(--mist);color:var(--muted)}
.st.cancelled{background:#fdeaea;color:#d23b3b}
/* chat */
.chathead{display:flex;align-items:center;gap:11px;padding:10px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:4}
.chathead .back{width:36px;height:36px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chathead .nm{font-family:'Inter Tight';font-weight:700;font-size:15px}
.chathead .stt{font-size:11.5px;color:var(--ok);display:flex;align-items:center;gap:4px}
.chathead .stt::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ok)}
.msgs{display:flex;flex-direction:column;gap:8px;padding:16px 16px 8px;overflow-y:auto;flex:1}
.bub{max-width:78%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.4}
.bub.them{background:var(--mist);align-self:flex-start;border-bottom-left-radius:5px}
.bub.me{background:var(--ink);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.bub.sys{align-self:center;background:var(--tint);color:var(--brand);font-size:12px;font-weight:600;border-radius:10px;text-align:center;display:inline-flex;gap:6px;align-items:center;max-width:90%}
.bub.sys .ic{width:14px;height:14px}
.chatbar{display:flex;gap:8px;padding:12px 14px;background:#fff;border-top:1px solid var(--line);align-items:center;flex-shrink:0}
.chatbar input{flex:1;border:1.5px solid var(--line);border-radius:999px;padding:11px 16px;font-size:14px;outline:none;font-family:inherit}
.chatbar .send{width:42px;height:42px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chatbar .send .ic{width:18px;height:18px}
/* banner */
.banner{border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.4;margin-bottom:14px}
.banner .ic{width:18px;height:18px;flex-shrink:0;margin-top:1px}
.banner.warn{background:var(--warn);color:var(--warnk)}
.banner.ok{background:var(--okt);color:#127a52}
.banner.info{background:#EEF3FF;color:#2350a8}
/* pay summary */
.payrow{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;color:var(--text)}
.payrow.tot{border-top:1px dashed var(--line);margin-top:6px;padding-top:13px;font-family:'Inter Tight';font-weight:800;font-size:18px;color:var(--ink)}
.paymethod{display:flex;align-items:center;gap:12px;border:1.5px solid var(--brand);background:var(--tint);border-radius:14px;padding:14px;margin-bottom:14px}
.paymethod .e{width:40px;height:40px;border-radius:11px;background:#fff;color:var(--brand);display:flex;align-items:center;justify-content:center}
/* pro online hero */
.onlinehero{margin:6px 20px 0;border-radius:22px;padding:22px;color:#fff;text-align:center;transition:.3s}
.onlinehero.on{background:linear-gradient(135deg,var(--ok),#36c98c)}
.onlinehero.off{background:linear-gradient(135deg,#3a3760,#262248)}
.onlinehero .pwr{width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.onlinehero .pwr .ic{width:40px;height:40px}
.onlinehero.on .pwr{box-shadow:0 0 0 8px rgba(255,255,255,.12);animation:pulse 2s infinite}
.onlinehero h2{color:#fff;font-size:21px}
.onlinehero p{opacity:.85;font-size:13.5px;margin-top:3px}
.onlinehero .toggle{margin-top:16px;background:#fff;color:var(--ink);font-family:'Inter Tight';font-weight:700;font-size:15px;padding:13px 26px;border-radius:999px;display:inline-flex;align-items:center;gap:8px}
.onlinehero.on .toggle{color:var(--ok)}
.onlinehero .toggle .ic{width:18px;height:18px}
/* stat row */
.statrow{display:flex;gap:10px;margin:16px 0}
.statrow .s{flex:1;background:var(--mist);border-radius:14px;padding:13px 8px;text-align:center}
.statrow .s b{font-family:'Inter Tight';font-size:18px;display:block;color:var(--ink)}
.statrow .s span{font-size:10.5px;color:var(--muted)}
/* settings */
.setgrp{margin-bottom:20px}
.setgrp .h{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px 4px}
.setitem{display:flex;align-items:center;gap:14px;padding:14px;background:#fff;border:1px solid var(--line);border-bottom:0;font-size:15px;font-weight:500}
.setgrp .setitem:first-child{border-radius:14px 14px 0 0}
.setgrp .setitem:last-child{border-radius:0 0 14px 14px;border-bottom:1px solid var(--line)}
.setitem .e{width:34px;height:34px;border-radius:10px;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ink)}
.setitem .e .ic{width:17px;height:17px}
.setitem .meta{flex:1;min-width:0}.setitem .meta .d{font-size:12px;color:var(--muted);font-weight:400}
.setitem .arr{margin-left:auto;color:var(--muted);display:flex}.setitem .arr .ic{width:18px;height:18px}
.switch{margin-left:auto;width:46px;height:27px;border-radius:999px;background:var(--line);position:relative;flex-shrink:0;transition:.2s}
.switch.on{background:var(--brand)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on::after{left:22px}

.incoming{position:absolute;left:14px;right:14px;top:54px;z-index:60;background:#fff;border-radius:20px;box-shadow:0 24px 50px rgba(3,1,76,.3);border:1px solid var(--line);overflow:hidden;animation:drop .3s var(--ease)}

.incoming .ihead{background:var(--brand);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:8px;font-family:'Inter Tight';font-weight:700;font-size:14px}

.incoming .ibody{padding:16px}
/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}

.cal .cdh{font-size:10px;color:var(--muted);text-transform:uppercase;text-align:center;padding-bottom:4px}

.cal .cd.has{background:var(--tint);color:var(--brand);font-weight:800}
.cal .cd.has::after{content:"";position:absolute;bottom:6px;width:4px;height:4px;border-radius:50%;background:var(--brand)}
.cal .cd.today{box-shadow:inset 0 0 0 1.5px var(--brand)}
/* toast */
.toast{position:absolute;bottom:92px;left:20px;right:20px;background:var(--ink);color:#fff;padding:13px 16px;border-radius:13px;font-size:14px;text-align:center;z-index:80;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;box-shadow:0 14px 30px rgba(0,0,0,.3)}

/* success */
.success{text-align:center;padding:54px 24px}
.success .big{width:94px;height:94px;border-radius:50%;background:var(--okt);color:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;animation:pop .4s var(--ease)}

.success .big .ic{width:48px;height:48px}
.success h2{font-size:24px;margin-bottom:10px}.success p{color:var(--muted);margin-bottom:28px;font-size:15px}
.demo-pill{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 10px;border-radius:999px;z-index:200;font-weight:600;letter-spacing:.04em}

.socialbtn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;border:1.5px solid var(--line);border-radius:14px;padding:14px;font-family:'Inter Tight';font-weight:600;font-size:15px;background:#fff;color:var(--ink);margin-bottom:11px}
.socialbtn:active{transform:scale(.98)}
.socialbtn.apple{background:#000;color:#fff;border-color:#000}
.orline{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12.5px;margin:18px 0;font-weight:600}

.passwrap{position:relative}
.passwrap input{padding-right:44px!important}

.authfoot{text-align:center;font-size:14px;color:var(--muted);margin-top:20px}

.testcred{background:var(--okt);color:#127a52;border-radius:12px;padding:11px 13px;font-size:12.5px;line-height:1.5;margin-bottom:18px;display:flex;gap:9px;align-items:flex-start}
.testcred .ic{width:16px;height:16px;flex-shrink:0;margin-top:1px}
/* onboarding */
.onb{height:100%;display:flex;flex-direction:column;text-align:center;padding:24px 28px 28px}
.onb .art{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}

.onb .blob .ic{width:84px;height:84px}
.onb h2{font-size:24px;margin-bottom:10px}
.onb p{color:var(--muted);font-size:15px;line-height:1.5;max-width:300px;margin:0 auto}
.pdots{display:flex;gap:7px;justify-content:center;margin:22px 0}
.pdots i{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.2s}

.skip{position:absolute;top:18px;right:22px;font-weight:600;color:var(--muted);font-size:14px;z-index:5}
/* code input */
.coderow{display:flex;gap:10px;justify-content:center;margin:26px 0}
.codebox{width:54px;height:62px;border:1.5px solid var(--line);border-radius:14px;text-align:center;font-family:'Inter Tight';font-weight:800;font-size:24px;color:var(--ink);outline:none;background:#fff}
.codebox:focus{border-color:var(--brand)}
.codebox.fill{border-color:var(--brand);background:var(--tint)}
/* MAP */
.map{height:300px;border-radius:20px;position:relative;overflow:hidden;background:#dfe6ef;margin-bottom:16px;box-shadow:inset 0 0 0 1px var(--line)}
.map .streets{position:absolute;inset:0;opacity:.6}
.map .streets span{position:absolute;background:#fff}

.map .mk .pin2{width:30px;height:30px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 5px 12px rgba(0,0,0,.25)}

.pf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pf{aspect-ratio:1;border-radius:13px;background:linear-gradient(135deg,var(--tint),#ffd9c9);display:flex;align-items:center;justify-content:center;color:var(--brand)}
.pf .ic{width:26px;height:26px}
.svc{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}

.favbtn{position:absolute;top:14px;right:18px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;color:var(--muted);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.favbtn.on{color:var(--brand)}
.favbtn .ic{width:21px;height:21px}
/* star input */
.starin{display:flex;gap:10px;justify-content:center;margin:22px 0}
.starin button .ic{width:42px;height:42px;color:var(--line);transition:.12s}
.starin button.on .ic{color:var(--star)}
.tagpick{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.tagpick button{border:1.5px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);background:#fff}
.tagpick button.on{border-color:var(--brand);background:var(--tint);color:var(--brand)}

.sosfab{position:absolute;right:16px;bottom:90px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 15px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#d23b3b;box-shadow:0 8px 20px rgba(3,1,76,.15);z-index:30}
.sosfab .ic{width:17px;height:17px}
.badgegrid{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.tbadge{display:inline-flex;align-items:center;gap:6px;background:var(--okt);color:#127a52;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px}
.tbadge .ic{width:14px;height:14px}
.addr{display:flex;gap:12px;align-items:center;padding:14px;border:1.5px solid var(--line);border-radius:14px;margin-bottom:10px}
.addr.sel{border-color:var(--brand);background:var(--tint)}
.addr .e{width:38px;height:38px;border-radius:11px;background:var(--mist);color:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* splash */
.splash{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(125% 125% at 50% 0,#221a6a,#0c0935 55%,#070528);color:#fff;text-align:center}
.splash .lg{width:96px;height:96px;border-radius:30px;background:var(--brand);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 50px rgba(255,72,0,.5);margin-bottom:22px;animation:pop .5s var(--ease)}
.splash .lg .ic{width:48px;height:48px;color:#fff}
.splash .nm{font-family:'Inter Tight';font-weight:800;font-size:34px;color:#fff;display:flex;align-items:center;gap:9px;letter-spacing:-.03em}
.splash .nm .d{width:11px;height:11px;border-radius:50%;background:var(--brand);margin-top:8px}
.splash .tg{color:rgba(255,255,255,.7);font-size:14.5px;margin-top:8px}
.splash .bar{margin-top:34px;width:120px;height:4px;border-radius:4px;background:rgba(255,255,255,.15);overflow:hidden}
.splash .bar i{display:block;height:100%;width:0;background:var(--brand);border-radius:4px;animation:load 1.4s var(--ease) forwards}
@keyframes load{from{width:0}to{width:100%}}
/* bell + promo + notif */
.hbell{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;color:#fff;position:relative}
.hbell .ic{width:20px;height:20px}
.hbell .ndot{position:absolute;top:9px;right:9px;width:9px;height:9px;border-radius:50%;background:var(--brand);border:2px solid #1a1463}
.promo{display:flex;align-items:center;gap:12px;background:var(--tint);border:1px solid #ffe0d2;border-radius:var(--r);padding:14px;margin-top:22px}
.promo .pico{width:44px;height:44px;border-radius:13px;background:#fff;color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.promo .pico .ic{width:22px;height:22px}

.notif .nico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.hactions{display:flex;gap:8px}

.searchhead{padding:10px 16px 12px;position:sticky;top:0;background:var(--paper);z-index:4;display:flex;gap:10px;align-items:center}

.receipt{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow);position:relative}
.receipt .stamp{position:absolute;top:18px;right:18px;border:2px solid var(--ok);color:var(--ok);font-family:'Inter Tight';font-weight:800;font-size:12px;padding:4px 9px;border-radius:8px;transform:rotate(8deg);opacity:.9}

.rdash{border-top:1px dashed var(--line);margin:14px 0}

.tips button.on{border-color:var(--brand);background:var(--tint);color:var(--brand)}
/* chat plus menu */
.plusbtn{width:40px;height:40px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink)}
.bub.img{padding:0;overflow:hidden;background:linear-gradient(135deg,var(--tint),#ffd9c9);width:150px;height:110px;display:flex;align-items:center;justify-content:center;color:var(--brand)}

.sk{background:linear-gradient(90deg,var(--mist) 25%,var(--line) 37%,var(--mist) 63%);background-size:400% 100%;animation:shimmer 1.3s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
</style>
</head>

function go(screen,params,push){clearTimers();params=params||{};if(push!==false&&S.screen)S.stack.push({screen:S.screen,params:S.params});S.screen=screen;S.params=params;rend();elScreen.scrollTop=0;}

/* ============ RENDER ROOT ============ */
const AUTHSCREENS=['splash','onboarding','login','signup','verify'];
function rend(){
  var dark=(S.mode==='user'&&S.screen==='home');
  elBar.className='statusbar'+(dark?' dark':'');
  elBar.style.display=(AUTHSCREENS.indexOf(S.screen)>=0)?'none':'flex';
  elBar.innerHTML='<span>9:41</span><span class="dots">'+ic('signal')+ic('wifi')+ic('battery')+'</span>';
  var fn=SCREENS[S.screen]||SCREENS.home;
  elScreen.className='screen'+(S.screen==='chat'?' noscroll':'');
  elScreen.style.paddingBottom=(AUTHSCREENS.indexOf(S.screen)>=0)?'0':'';
  elScreen.innerHTML=fn(S.params);
  // nav hidden on focused flows
  var hideNav=['chat','request-when','request-cat','searching','payment','success','pro-grab','tracking','rate','provider','search','receipt','estimate','choose-pro','verify-id','pro-sim'].concat(AUTHSCREENS).indexOf(S.screen)>=0;
  elNav.style.display=hideNav?'none':'flex';
  if(!hideNav)elNav.innerHTML=navHTML();
  renderOverlay();
  if(SCREENS[S.screen]&&SCREENS[S.screen]._after)SCREENS[S.screen]._after(S.params);
}
function navHTML(){
  var items=S.mode==='user'
   ?[['home','home','Início'],['request-cat','search','Pedir'],['orders','list','Pedidos'],['user-profile','user','Conta']]
   :[['pro-home','power','Status'],['pro-jobs','list','Trabalhos'],['pro-calendar','calendar','Agenda'],['pro-profile','user','Conta']];
  var act=activeOrder();
  return items.map(function(it){
    var on=S.screen===it[0]||(it[0]==='request-cat'&&['request-when','searching'].indexOf(S.screen)>=0)||(it[0]==='orders'&&S.screen==='order')||(it[0]==='pro-jobs'&&S.screen==='pro-order');
    var badge=((it[0]==='orders'||it[0]==='pro-jobs')&&act)?' dotn':'';
    return '<button class="navitem'+(on?' active':'')+'" data-nav="'+it[0]+'"><span class="'+badge+'">'+ic(it[1])+'</span>'+it[2]+'</button>';
  }).join('');
}

// ETAPAS da ordem (timeline) — varia se 'now' ou 'sched'
function steps(o){
  var base;
  if(o.type==='now'){
    base=[['searching','Procurando prestador'],['confirmed','Prestador confirmou'],['inprogress','Atendimento em andamento'],['done','Atendimento realizado'],['paid','Pagamento']];
  }else{
    base=[['awaiting','Aguardando confirmação'],['confirmed','Confirmado'],['inprogress','Atendimento em andamento'],['done','Atendimento realizado'],['paid','Pagamento']];
  }
  var order=['searching','awaiting','suggested','confirmed','inprogress','done','paid','cancelled'];
  var cur=order.indexOf(o.status);
  return '<div class="timeline">'+base.map(function(s){
    var si=order.indexOf(s[0]);
    var st=si<cur?'done':(si===cur?'active':'pending');
    if(o.status==='suggested'&&s[0]==='confirmed')st='active';

  }).join('')+'</div>';
}

// CHAT
SCREENS.chat=function(p){
  var o=orderById(p.id)||activeOrder();
  var pr=o?PROS[o.cat]:{name:'Prestador',ini:'P',av:'b1'};
  var name=S.mode==='pro'?'Leonardo (cliente)':(o?o.proName||pr.name:pr.name);

  o._msgs=o._msgs||defaultMsgs(o);

   '<div class="chatbar"><button class="plusbtn" data-act="chat-attach" data-id="'+(o?o.id:'')+'">'+ic('plus')+'</button><input id="chatinput" placeholder="Mensagem..."><button class="send" data-act="send" data-id="'+(o?o.id:'')+'">'+ic('send')+'</button></div>';

SCREENS.chat._after=function(){var m=document.getElementById('msgs');if(m)m.scrollTop=m.scrollHeight;};
function bubHTML(m){if(m.t==='sys')return '<div class="bub sys">'+ic('lock')+m.b+'</div>';
  var mine=(S.mode==='pro')?(m.t==='them'):(m.t==='me');var cls=mine?'me':'them';
  if(m.kind==='img')return '<div class="bub img '+cls+'">'+ic('image')+'</div>';
  if(m.kind==='loc')return '<div class="bub loc '+cls+'"><div class="map2">'+ic('pin')+'</div><div class="cap">'+ic('pin','width:12px;height:12px')+' '+m.b+'</div></div>';
  return '<div class="bub '+cls+'">'+m.b+'</div>';}
function defaultMsgs(o){if(!o)return [{t:'them',b:'Olá! Como posso ajudar?'}];var c=cat(o.cat);
  return [{t:'sys',b:'Pagamento protegido pelo Leblon'},{t:'them',b:'Oi! Recebi seu pedido de '+c.name.toLowerCase()+'. Já estou me organizando.'},{t:'me',b:'Perfeito! Pode confirmar o endereço?'},{t:'them',b:'Sim, Rua 234, Centro. Chego no horário combinado 👍'}];}

     '<div class="card" style="text-align:left"><div class="row between" style="margin-bottom:10px"><div class="row" style="gap:10px"><div class="ordercard ico" style="margin:0">'+ic(c.ic)+'</div><div><div class="dp b">'+c.name+'</div><div class="sm muted">Atendimento imediato</div></div></div><b class="dp" style="color:var(--brand)">'+c.price+'</b></div>'+

       '<div class="row between sm" style="margin-top:8px"><span class="muted">Cliente</span><b>Leonardo F. '+star1('var(--star)')+' 4,9</b></div>'+
       '<p class="sm muted" style="margin-top:10px">"'+(o.note||'Preciso de atendimento o quanto antes, obrigado!')+'"</p>'+
     '</div>'+
     '<div class="row" style="gap:10px;margin-top:18px"><button class="btn btn-out" data-act="decline-grab" data-id="'+o.id+'">Recusar</button><button class="btn btn-ok" data-act="accept-grab" data-id="'+o.id+'">'+ic('check')+'Aceitar agora</button></div>'+

SCREENS['pro-grab']._after=function(p){
  var o=orderById(p.id);if(!o)return;
  var R=54,CIRC=2*Math.PI*R;var total=600;var left=total; // 10 min demo (acelerado visualmente)
  var ring=document.getElementById('ring'),nEl=document.getElementById('ring-n');
  var iv=setInterval(function(){
    left-=6; // acelera: ~10s simula 10min
    if(left<=0){left=0;clearInterval(iv);}
    var m=Math.floor(left/60),s=left%60;
    if(nEl)nEl.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(ring)ring.style.strokeDashoffset=CIRC*(1-left/total);
    if(left<=0){o.status='cancelled';o._reason='Tempo esgotado';persist();toast('Tempo esgotado — pedido foi para outro prestador');go('pro-home',{},false);}
  },100);
  TIMERS.push(iv);
};

/* overlay (modais de cancelar / remarcar / sugerir) */
var MODAL=null;
function openModal(html){MODAL=html;renderOverlay();}
function closeModal(){MODAL=null;renderOverlay();}
function renderOverlay(){
  if(!MODAL){elOverlay.innerHTML='';elOverlay.style.cssText='';return;}
  elOverlay.style.cssText='position:absolute;inset:0;z-index:90;background:rgba(3,1,76,.45);display:flex;align-items:flex-end';
  elOverlay.innerHTML='<div style="background:#fff;width:100%;border-radius:24px 24px 0 0;padding:22px 20px 26px;animation:drop .25s var(--ease)">'+MODAL+'</div>';
}

/* ============ AÇÕES (delegação de clique) ============ */
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-go],[data-back],[data-nav],[data-mode],[data-act],[data-toggle],[data-mode-now]');
  if(!t)return;
  // modais fecham ao clicar no backdrop
  if(e.target===elOverlay){closeModal();return;}
  var d=t.dataset;
  if(d.mode){setMode(d.mode);return;}
  if(d.back!==undefined){back();return;}
  if(d.nav){reset(d.nav);return;}
  if(d.go){
    if(d.modeNow)S.draft.flow=d.modeNow;
    if(d.cat&&d.go==='request-cat'){S.draft.flow=S.draft.flow||(cat(d.cat).now?'':'sched');go('request-when',{cat:d.cat});return;}
    var params={};if(d.id)params.id=d.id;if(d.cat)params.cat=d.cat;
    if(d.go==='success')return; // handled elsewhere
    go(d.go,params);return;
  }
  if(d.toggle){PRO[d.toggle]=!PRO[d.toggle];persist();rend();return;}
  var act=d.act;if(!act)return;
  ACTIONS[act]&&ACTIONS[act](d,t);
});
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='chatinput'){ACTIONS.send({id:S.params.id});}});

const ACTIONS={
  // ---- usuário ----
  dispatch:function(d){
    var o={id:Date.now(),cat:d.cat,type:'now',status:'searching',createdAt:Date.now(),note:'Disjuntor caiu e não volta'};
    ORDERS.push(o);persist();go('searching',{id:o.id},false);
  },
  'cancel-search':function(d){var o=orderById(d.id);if(o){o.status='cancelled';persist();}toast('Busca cancelada');reset('home');},
  schedule:function(d){
    var fixed=d.fixed==='1';
    if(fixed&&!S.draft.slot){toast('Escolha um horário');return;}
    var chosen=S.draft._pro||PROS[d.cat];
    var o={id:Date.now(),cat:d.cat,type:'sched',day:S.draft.day||0,slot:fixed?S.draft.slot:null,status:'awaiting',proName:chosen.name,_pro:chosen,recur:!!S.draft.recur,createdAt:Date.now()};
    ORDERS.push(o);persist();
    go('order',{id:o.id},false);
    toast('Pedido enviado a '+o.proName);
    // simula resposta do prestador: confirma ou sugere outro horário
    later(function(){
      var pick=Math.random();
      if(pick<0.45){ // não pode → sugere outro horário
        o.status='suggested';o.suggestDay=(o.day+1)%7;o.suggestSlot=o.slot?'10:30':null;persist();
        toast(o.proName+' sugeriu outro horário');
      }else{
        o.status='confirmed';o.confirmedAt=Date.now();persist();
        toast(o.proName+' confirmou seu agendamento');
      }
      if(S.screen==='order')rend();
    },3200);
  },
  'accept-suggest':function(d){var o=orderById(d.id);o.day=o.suggestDay;o.slot=o.suggestSlot;o.status='confirmed';persist();toast('Novo horário confirmado');rend();},
  'reject-suggest':function(d){var o=orderById(d.id);o.status='cancelled';o._reason='Cliente recusou o novo horário';persist();rend();},
  'open-cancel':function(d){
    var o=orderById(d.id);
    openModal('<h3 style="font-size:19px;margin-bottom:6px">Cancelar atendimento?</h3><p class="muted sm" style="margin-bottom:14px">Conte o motivo. Cancelamentos em cima da hora podem ter taxa, conforme a política.</p>'+
      '<div class="field"><label>Motivo do cancelamento</label><select id="cancel-reason"><option>Não preciso mais</option><option>Encontrei outro profissional</option><option>O horário não serve mais</option><option>O prestador demorou</option><option>Outro motivo</option></select></div>'+
      (o.type==='sched'?'<button class="btn btn-out" style="margin-bottom:10px" data-act="open-remarcar" data-id="'+d.id+'">'+ic('calendar')+'Prefiro remarcar</button>':'')+
      '<button class="btn btn-danger" data-act="do-cancel" data-id="'+d.id+'">Confirmar cancelamento</button>'+
      '<button class="btn btn-ghost" style="margin-top:10px" data-act="close-modal">Voltar</button>');
  },
  'do-cancel':function(d){var o=orderById(d.id);var rs=document.getElementById('cancel-reason');o.status='cancelled';o._reason=(rs&&rs.value)||'Cancelado';persist();closeModal();
    // CANCELADO → REMARCAR? (oferece remarcar conforme o fluxo)
    if(o.type==='sched'){openModal('<h3 style="font-size:19px;margin-bottom:6px">Deseja remarcar?</h3><p class="muted sm" style="margin-bottom:18px">Seu atendimento foi cancelado. Quer escolher uma nova data?</p><div class="row" style="gap:10px"><button class="btn btn-out" data-act="close-modal2">Não</button><button class="btn btn-pri" data-act="remarcar-now" data-id="'+d.id+'">Sim, remarcar</button></div>');}
    else{rend();toast('Atendimento cancelado');}
  },
  'open-remarcar':function(d){closeModal();var o=orderById(d.id);S.draft.flow='sched';go('request-when',{cat:o.cat});toast('Escolha a nova data');},
  'remarcar-now':function(d){closeModal();var o=orderById(d.id);S.draft.flow='sched';go('request-when',{cat:o.cat});},
  'close-modal':function(){closeModal();},
  'close-modal2':function(){closeModal();rend();toast('Atendimento cancelado');},
  pay:function(d){var o=orderById(d.id);var c=cat(o.cat);
    var val=parseInt(c.price.replace(/\D/g,''));var fee=Math.round(val*0.15);
    o._tip=S.draft.payTip||0;o._coupon=S.draft.payCoupon||'';o._discount=S.draft.payDiscount||0;
    o._total=val+fee-o._discount+o._tip;
    o.status='paid';o.paidAt=Date.now();persist();S.rateId=o.id;S.receiptId=o.id;
    go('success',{icon:'check',title:'Pagamento concluído!',sub:'O valor fica protegido e é liberado ao prestador. Que tal avaliar o atendimento?',cta:'⭐ Avaliar prestador',act:'go-rate',cta2:'Ver comprovante',act2:'go-receipt'},false);
  },
  'go-rate':function(){go('rate',{id:S.rateId},false);},
  'go-receipt':function(){go('receipt',{id:S.receiptId},false);},
  'apply-coupon':function(){var el=document.getElementById('coupon');var code=(el?el.value:'').trim().toUpperCase();if(!code){toast('Digite um cupom');return;}if(COUPONS[code]){S.draft.payCoupon=code;S.draft.payDiscount=COUPONS[code];rend();toast('Cupom aplicado: - R$ '+COUPONS[code]);}else{S.draft.payCoupon='';S.draft.payDiscount=0;rend();toast('Cupom inválido');}},
  'set-tip':function(d){S.draft.payTip=+d.t;rend();},
  review:function(){toast('Obrigado pela avaliação! ⭐');},
  send:function(d){var inp=document.getElementById('chatinput');if(!inp||!inp.value.trim())return;var o=orderById(d.id)||activeOrder();if(!o)return;o._msgs=o._msgs||defaultMsgs(o);
    var mine=S.mode==='pro'?'them':'me';o._msgs.push({t:mine,b:inp.value.trim()});inp.value='';rend();
    later(function(){o._msgs.push({t:S.mode==='pro'?'me':'them',b:'Perfeito, combinado! 👍'});if(S.screen==='chat')rend();},1100);
  },
  // ---- prestador ----
  'toggle-online':function(){PRO.online=!PRO.online;persist();rend();toast(PRO.online?'Você está online — recebendo pedidos':'Você ficou offline');},
  'sim-now':function(){
    if(!PRO.now){toast('Ative "Serviços na hora" no tipo de serviço');return;}
    var o={id:Date.now(),cat:'eletricista',type:'now',status:'awaiting-grab',note:'Disjuntor caiu e não volta, preciso urgente',createdAt:Date.now()};
    ORDERS.push(o);persist();go('pro-grab',{id:o.id},false);
  },
  'sim-sched':function(){
    var o={id:Date.now(),cat:'barbeiro',type:'sched',day:1,slot:'09:00',status:'awaiting',createdAt:Date.now()};
    ORDERS.push(o);persist();go('pro-confirm',{id:o.id},false);
  },
  'accept-grab':function(d){clearTimers();var o=orderById(d.id);o.status='confirmed';o.proName=PROS[o.cat].name;persist();
    go('chat',{id:o.id},false);toast('Você pegou o atendimento! Fale com o cliente.');},
  'decline-grab':function(d){clearTimers();var o=orderById(d.id);o.status='cancelled';o._reason='Recusado pelo prestador';persist();reset('pro-home');},
  'confirm-sched':function(d){var o=orderById(d.id);o.status='confirmed';o.proName=PROS[o.cat].name;persist();
    go('chat',{id:o.id},false);toast('Agendamento confirmado!');},
  'open-suggest':function(d){
    openModal('<h3 style="font-size:19px;margin-bottom:4px">Sugerir outro horário</h3><p class="muted sm" style="margin-bottom:16px">Você não pode no horário pedido. Proponha uma nova data — o cliente decide se aceita.</p>'+
      '<div class="field"><label>Novo dia</label><select id="sg-day"><option value="2">depois de amanhã</option><option value="3">quinta 14/06</option><option value="4">sexta 15/06</option></select></div>'+
      '<div class="field"><label>Novo horário</label><select id="sg-slot"><option>10:30</option><option>14:00</option><option>16:00</option></select></div>'+
      '<button class="btn btn-pri" data-act="do-suggest" data-id="'+d.id+'">Enviar sugestão</button><button class="btn btn-ghost" style="margin-top:10px" data-act="close-modal">Cancelar</button>');
  },
  'do-suggest':function(d){var o=orderById(d.id);var dy=document.getElementById('sg-day'),sl=document.getElementById('sg-slot');
    o.status='suggested';o.suggestDay=+(dy?dy.value:2);o.suggestSlot=cat(o.cat).sched==='fixed'?(sl?sl.value:'10:30'):null;o.proName=PROS[o.cat].name;persist();closeModal();
    go('success',{icon:'clock',title:'Sugestão enviada!',sub:'O cliente vai receber sua proposta de novo horário e pode aceitar ou recusar.',cta:'Voltar aos trabalhos',go:'pro-jobs'},false);
  },
  'decline-sched':function(d){var o=orderById(d.id);o.status='cancelled';o._reason='Recusado pelo prestador';persist();reset('pro-home');toast('Pedido recusado');},
  'pro-start':function(d){var o=orderById(d.id);o.status='inprogress';persist();rend();toast('Atendimento iniciado');},
  'pro-done':function(d){var o=orderById(d.id);o.status='done';persist();rend();toast('Marcado como realizado. Aguardando pagamento.');},
  'sim-pay':function(d){var o=orderById(d.id);o.status='paid';o.paidAt=Date.now();persist();rend();toast('Pagamento recebido! 💰');}

  '</div>'+
  '<div class="banner info" style="margin-top:14px">'+ic('info')+'<div>O valor final é combinado com o prestador conforme o serviço. No app real, você confirma antes de pagar.</div></div>'+
  (c.now?'<button class="btn btn-pri" data-act="dispatch" data-cat="'+c.id+'">'+ic('bolt')+'Preciso agora</button>':'')+
  '<button class="btn '+(c.now?'btn-out':'btn-pri')+'" style="margin-top:'+(c.now?'10px':'0')+'" data-act="prov-sched" data-cat="'+c.id+'">'+ic('calendar')+'Agendar</button>'+
 '</div>';
};
SCREENS.receipt=function(p){
 var o=orderById(p.id)||{};var c=cat(o.cat)||CATS[0];
 var val=o._total||parseInt(c.price.replace(/\D/g,''));
 return topbar('Comprovante')+'<div class="pad">'+
  '<div class="receipt"><div class="stamp">PAGO</div>'+
   '<div class="row" style="gap:11px;margin-bottom:8px"><div class="ordercard ico" style="margin:0">'+ic(c.ic)+'</div><div><h3>'+c.name+'</h3><div class="sm muted">'+(o.proName||'Prestador')+'</div></div></div>'+
   '<div class="rdash"></div>'+
   '<div class="payrow"><span class="muted">Pedido</span><span>#'+(o.id||'000').toString().slice(-6)+'</span></div>'+
   '<div class="payrow"><span class="muted">Data</span><span>14/06/2026 · 09:41</span></div>'+
   '<div class="payrow"><span class="muted">Forma de pagamento</span><span>Pix</span></div>'+
   (o._coupon?'<div class="payrow"><span class="muted">Cupom '+o._coupon+'</span><span style="color:var(--ok)">- R$ '+o._discount+'</span></div>':'')+
   (o._tip?'<div class="payrow"><span class="muted">Gorjeta</span><span>R$ '+o._tip+'</span></div>':'')+
   '<div class="payrow tot"><span>Total pago</span><span>R$ '+val+'</span></div>'+
  '</div>'+
  '<button class="btn btn-pri" style="margin-top:16px" data-act="save-toast">'+ic('send')+'Compartilhar comprovante</button>'+
  '<button class="btn btn-out" style="margin-top:10px" data-go="home">Voltar ao início</button>'+
 '</div>';
};
/* ===== ONDA 3: verificação de identidade ===== */
SCREENS['verify-id']=function(){
 var st=S.vidStep||0;
 var STEPS=[
  {ic:'card',t:'Envie seu documento',d:'Fotografe a frente do seu RG ou CNH. Os dados são protegidos e usados só para verificação.',cta:'Enviar documento'},
  {ic:'camera',t:'Tire uma selfie',d:'Uma selfie rápida para confirmar que é você mesmo.',cta:'Tirar selfie'}
 ];
 var s=STEPS[st];
 return topbar('Verificar identidade')+'<div class="pad center">'+
  '<div class="pdots" style="margin:6px 0 22px">'+STEPS.map(function(_,i){return '<i class="'+(i<=st?'on':'')+'"></i>';}).join('')+'</div>'+
  '<div class="av xl" style="margin:0 auto 16px;background:var(--tint);color:var(--brand)">'+ic(s.ic,'width:36px;height:36px')+'</div>'+
  '<h2 style="font-size:21px">'+s.t+'</h2><p class="muted" style="margin:8px 0 0">'+s.d+'</p>'+
  '<div class="card" style="height:170px;display:flex;align-items:center;justify-content:center;border:2px dashed var(--line);background:var(--mist);margin-top:18px">'+ic(s.ic,'width:44px;height:44px;color:var(--muted)')+'</div>'+
  '<button class="btn btn-pri" style="margin-top:18px" data-act="vid-next">'+ic('camera')+s.cta+'</button>'+
  '<div class="banner ok" style="margin-top:14px;text-align:left">'+ic('lock')+'<div>Seus documentos são criptografados e nunca compartilhados.</div></div>'+
 '</div>';
};
Object.assign(ACTIONS,{
 'toggle-theme':function(){THEME=THEME==='dark'?'light':'dark';persist();applyTheme();rend();toast(THEME==='dark'?'Modo escuro ativado':'Modo claro ativado');},
 'search-pick':function(d){S.searchQ=d.q;rend();},
 'vid-next':function(){if((S.vidStep||0)<1){S.vidStep=(S.vidStep||0)+1;rend();}else{S.vidStep=0;if(AUTH){AUTH.verified=true;save('auth',AUTH);}go('success',{icon:'shield',title:'Identidade verificada!',sub:'Sua conta agora tem o selo de confiança. Prestadores e clientes confiam mais em você.',cta:'Voltar à conta',go:'user-profile'},false);}},
 'chat-attach':function(d){openModal('<h3 style="font-size:18px;margin-bottom:14px">Enviar no chat</h3>'+
   '<button class="btn btn-out" style="margin-bottom:10px" data-act="send-photo" data-id="'+d.id+'">'+ic('camera')+'Foto</button>'+
   '<button class="btn btn-out" data-act="send-loc" data-id="'+d.id+'">'+ic('pin')+'Minha localização</button>'+
   '<button class="btn btn-ghost" style="margin-top:10px" data-act="close-modal">Cancelar</button>');},
 'send-photo':function(d){closeModal();var o=orderById(d.id)||activeOrder();if(!o)return;o._msgs=o._msgs||defaultMsgs(o);o._msgs.push({t:S.mode==='pro'?'them':'me',kind:'img',b:'foto'});if(S.screen==='chat')rend();toast('Foto enviada');},
 'send-loc':function(d){closeModal();var o=orderById(d.id)||activeOrder();if(!o)return;o._msgs=o._msgs||defaultMsgs(o);o._msgs.push({t:S.mode==='pro'?'them':'me',kind:'loc',b:'Rua 234, Centro · Itapema'});if(S.screen==='chat')rend();toast('Localização enviada');},
 dispute:function(d){openModal('<h3 style="font-size:19px;margin-bottom:6px">Tive um problema</h3><p class="muted sm" style="margin-bottom:16px">Conte o que houve. Nossa equipe analisa em até 24h e o pagamento fica retido até a resolução.</p>'+
   '<div class="field"><label>Motivo</label><select><option>Serviço não foi concluído</option><option>Qualidade abaixo do combinado</option><option>Prestador não compareceu</option><option>Cobrança incorreta</option><option>Outro</option></select></div>'+
   '<div class="field"><textarea rows="3" placeholder="Descreva o ocorrido (opcional)"></textarea></div>'+
   '<button class="btn btn-pri" data-act="do-dispute">Abrir disputa</button><button class="btn btn-ghost" style="margin-top:10px" data-act="close-modal">Cancelar</button>');},
 'do-dispute':function(){closeModal();toast('Disputa aberta. Acompanhe pelo suporte.');}
});

/* ===== ONDA 4: simulador de ganhos + saque ===== */
SCREENS['pro-sim']=function(){
 return topbar('Simulador de ganhos')+'<div class="pad">'+
  '<div class="card"><div class="muted sm center">Você pode ganhar até</div><div class="bignum" id="sim-monthly">R$ 0</div><div class="center xs muted">por mês, já com a taxa de 15% descontada</div></div>'+
  '<div class="card" style="margin-top:14px">'+
    '<label class="b sm">Horas por semana: <span id="sim-hl"></span></label><input class="sld" type="range" min="5" max="60" id="sim-h">'+
    '<label class="b sm" style="display:block;margin-top:16px">Valor médio por serviço: <span id="sim-tl"></span></label><input class="sld" type="range" min="40" max="300" step="5" id="sim-t">'+
  '</div>'+
  '<div class="statrow"><div class="s"><b id="sim-jobs">~0</b><span>serviços/semana</span></div><div class="s"><b id="sim-weekly">R$ 0</b><span>por semana</span></div></div>'+
  '<div class="banner info" style="margin-top:8px">'+ic('info')+'<div>Estimativa para você se planejar. Ganhos reais dependem da demanda na sua região e da sua disponibilidade.</div></div>'+
  '<button class="btn btn-pri" style="margin-top:6px" data-mode="user">'+ic('bolt')+'Quero receber pedidos agora</button>'+
 '</div>';
};
SCREENS['pro-sim']._after=function(){
 var h=document.getElementById('sim-h'),t=document.getElementById('sim-t');if(!h||!t)return;
 h.value=S.simH||20;t.value=S.simT||90;
 function upd(){var H=+h.value,T=+t.value;S.simH=H;S.simT=T;var jobs=Math.round(H*0.7);var weekly=Math.round(jobs*T*0.85);var monthly=weekly*4;
   document.getElementById('sim-monthly').textContent='R$ '+monthly.toLocaleString('pt-BR');
   document.getElementById('sim-hl').textContent=H+'h';document.getElementById('sim-tl').textContent='R$ '+T;
   document.getElementById('sim-jobs').textContent='~'+jobs;document.getElementById('sim-weekly').textContent='R$ '+weekly;}
 h.oninput=upd;t.oninput=upd;upd();
};
Object.assign(ACTIONS,{
 'open-withdraw':function(){openModal('<h3 style="font-size:19px;margin-bottom:6px">Sacar via Pix</h3><p class="muted sm" style="margin-bottom:14px">Disponível: <b>R$ 1.240,00</b>. O Pix cai na hora.</p>'+
   '<div class="field"><label>Valor</label><input id="wd-val" value="R$ 1.240,00"></div>'+
   '<div class="field"><label>Chave Pix</label><input id="wd-key" value="leo@leblon.app"></div>'+
   '<button class="btn btn-pri" data-act="do-withdraw">Confirmar saque</button><button class="btn btn-ghost" style="margin-top:10px" data-act="close-modal">Cancelar</button>');},
 'do-withdraw':function(){closeModal();go('success',{icon:'pix',title:'Saque solicitado!',sub:'R$ 1.240,00 a caminho da sua chave Pix. O valor costuma cair em segundos.',cta:'Voltar',go:'pro-profile'},false);}
});

/* arranque */
function afterSplash(){
 if(AUTH){S.mode='user';go('home',{},false);}
 else{S.screen=load('seen-onb',false)?'login':'onboarding';rend();}
}
function boot(){ applyTheme();S.screen='splash';rend();setTimeout(afterSplash,1600); }
boot();
</script>
