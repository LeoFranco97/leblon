<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Leblon, protótipo do app</title>
<meta name="description" content="Protótipo navegável do marketplace de serviços Leblon."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#03014C;--ink2:#0A0838;--brand:#FF4800;--brand6:#E03F00;--tint:#FFF1EC;
  --paper:#fff;--mist:#F6F7FB;--line:#ECEDF4;--muted:#6A6A82;--text:#15132E;
  --ok:#1FB67A;--star:#FFB400;--blue:#2563eb;--r:18px;--ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:#22203f;color:var(--text);display:flex;justify-content:center;min-height:100vh}
h1,h2,h3,h4,.dp{font-family:'Inter Tight','Inter',sans-serif;letter-spacing:-.02em;color:var(--ink)}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
img{max-width:100%}
.ic{width:1em;height:1em;display:inline-block;vertical-align:-.13em;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}

.phone{width:100%;max-width:430px;background:var(--paper);min-height:100vh;position:relative;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5)}
@media(min-width:480px){body{padding:24px 0}.phone{min-height:auto;height:calc(100vh - 48px);max-height:920px;border-radius:42px;border:10px solid #0c0a26}}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 22px 4px;font-size:13px;font-weight:600;color:var(--ink);flex-shrink:0;background:var(--paper)}
.statusbar .ic{width:16px;height:16px}
.statusbar.dark{color:#fff;background:transparent;position:absolute;left:0;right:0;top:0;z-index:5}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:90px;animation:fade .25s var(--ease)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pad{padding:0 20px}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px 14px;position:sticky;top:0;background:var(--paper);z-index:4}
.topbar .back{width:38px;height:38px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;font-size:18px}
.topbar h2{font-size:19px;font-weight:700;flex:1}
.topbar .act{width:38px;height:38px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;font-size:17px}
.row{display:flex;align-items:center;gap:12px}.between{justify-content:space-between}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--tint);color:var(--brand);font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;white-space:nowrap}
.chip.gray{background:var(--mist);color:var(--muted)}
.chip.live{background:rgba(31,182,122,.14);color:var(--ok)}
.chip.live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ok)}
.verified{color:var(--blue);display:inline-flex}.verified .ic{width:14px;height:14px}
.stars{display:inline-flex;gap:1px;vertical-align:middle}
.muted{color:var(--muted)}.sm{font-size:13px}.xs{font-size:11px}.b{font-weight:700}
.divider{height:1px;background:var(--line);margin:16px 0}
.sec-title{font-size:17px;font-weight:700;margin:22px 0 12px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:0 1px 2px rgba(3,1,76,.05)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter Tight';font-weight:600;font-size:16px;padding:15px 20px;border-radius:14px;width:100%;transition:transform .15s var(--ease),background .15s}
.btn .ic{width:18px;height:18px}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--brand);color:#fff;box-shadow:0 6px 18px rgba(255,72,0,.3)}
.btn-pri:active{background:var(--brand6)}
.btn-out{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn-sm{padding:10px 16px;font-size:14px;width:auto;border-radius:11px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter Tight';font-weight:700;flex-shrink:0;background:linear-gradient(135deg,var(--brand),#ff9466)}
.av.lg{width:64px;height:64px;font-size:24px}.av.md{width:48px;height:48px;font-size:18px}.av.sm{width:40px;height:40px;font-size:15px}
.av.b1{background:linear-gradient(135deg,#3b34c4,#6a63e6)}.av.b2{background:linear-gradient(135deg,#1FB67A,#5fd6a8)}
.av.b3{background:linear-gradient(135deg,#7c3aed,#b388ff)}.av.b4{background:linear-gradient(135deg,#2563eb,#6aa0ff)}
.botnav{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 8px 6px;z-index:20}
.navitem{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--muted);flex:1;padding-top:8px}
.navitem.active{color:var(--brand)}.navitem .ic{width:22px;height:22px}
.navfab{width:56px;height:56px;border-radius:20px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 8px 20px rgba(255,72,0,.45);flex-shrink:0}
.navfab .ic{width:28px;height:28px}
.modeseg{display:flex;background:var(--mist);border-radius:999px;padding:4px;gap:4px;margin:4px 0 18px}
.modeseg button{flex:1;font-family:'Inter Tight';font-weight:600;font-size:14px;padding:10px;border-radius:999px;color:var(--muted)}
.modeseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(3,1,76,.12)}
.searchbar{display:flex;align-items:center;gap:10px;background:var(--mist);border-radius:14px;padding:13px 16px;font-size:15px;color:var(--muted)}
.searchbar .ic{width:18px;height:18px}
.searchbar input{border:0;background:none;outline:none;flex:1;font-size:15px;font-family:inherit;color:var(--text)}
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.catitem{display:flex;flex-direction:column;align-items:center;gap:7px;padding:6px 2px}
.catitem .e{width:54px;height:54px;border-radius:16px;background:var(--tint);display:flex;align-items:center;justify-content:center;color:var(--brand);transition:transform .15s}
.catitem .e .ic{width:25px;height:25px}
.catitem:active .e{transform:scale(.92)}
.catitem span{font-size:11px;font-weight:600;text-align:center;color:var(--text);line-height:1.2}
.pcard{display:flex;gap:12px;padding:14px;border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;background:#fff;transition:transform .15s;align-items:center}
.pcard:active{transform:scale(.985)}
.pcard .meta{flex:1;min-width:0}
.pcard .nm{font-family:'Inter Tight';font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:5px}
.pcard .price{text-align:right;flex-shrink:0}
.pcard .price b{font-family:'Inter Tight';color:var(--ink);font-size:15px;display:block}
.homehead{background:linear-gradient(160deg,#14104f,var(--ink));padding:46px 20px 24px;color:#fff;border-radius:0 0 26px 26px}
.homehead .loc{font-size:13px;opacity:.85;display:flex;align-items:center;gap:5px}
.homehead .loc .ic{width:15px;height:15px}
.homehead h1{color:#fff;font-size:23px;margin:4px 0 16px;font-weight:800}
.homehead .searchbar{background:rgba(255,255,255,.14);color:rgba(255,255,255,.7)}
.homehead .searchbar input{color:#fff}
.homehead .searchbar input::placeholder{color:rgba(255,255,255,.6)}
.earn{background:linear-gradient(135deg,var(--ink),#241c6e);color:#fff;border-radius:20px;padding:20px;margin-bottom:6px}
.earn .v{font-family:'Inter Tight';font-weight:800;font-size:32px;margin:4px 0}
.earn .up{color:#7ee9b8;font-size:12px;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:4px}
.earn .up .ic{width:13px;height:13px}
.statrow{display:flex;gap:10px;margin-top:14px}
.statrow .s{flex:1;background:rgba(255,255,255,.1);border-radius:12px;padding:10px;text-align:center}
.statrow .s b{font-family:'Inter Tight';font-size:16px;display:block}
.statrow .s span{font-size:10px;opacity:.7}
.opp{border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:12px;background:#fff}
.opp .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.opp h3{font-size:15px;font-weight:700}
.match{background:#E9FBF3;color:var(--ok);font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
.opp .info{display:flex;gap:14px;margin:8px 0 12px;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}
.opp .info span{display:inline-flex;align-items:center;gap:4px}
.opp .info .ic{width:14px;height:14px}
.job{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;display:flex;gap:12px;align-items:center;margin-bottom:10px;box-shadow:0 1px 2px rgba(3,1,76,.05)}
.job .ic-box{width:42px;height:42px;border-radius:12px;background:var(--tint);display:flex;align-items:center;justify-content:center;color:var(--brand);flex-shrink:0}
.job .ic-box .ic{width:21px;height:21px}
.job .info{flex:1;min-width:0}
.job .info b{font-family:'Inter Tight';font-size:14px;color:var(--ink);display:block}
.job .info span{font-size:12px;color:var(--muted)}
.job .price{font-family:'Inter Tight';font-weight:700;color:var(--brand);font-size:15px}
.float-card{position:absolute;background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 14px 30px rgba(3,1,76,.18);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--ink)}
.float-card .badge{width:30px;height:30px;border-radius:50%;background:var(--tint);color:var(--brand);display:flex;align-items:center;justify-content:center}
.float-card .badge .ic{width:16px;height:16px}
.fc1{top:40px;left:-12px}.fc2{bottom:90px;right:-16px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:0 -20px;padding:0 20px;position:sticky;top:0;background:#fff;z-index:3}
.tabs button{padding:13px 4px;font-family:'Inter Tight';font-weight:600;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;flex:1}
.tabs button.on{color:var(--brand);border-bottom-color:var(--brand)}
.progress{height:5px;background:var(--mist);border-radius:5px;margin:0 0 22px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--brand);border-radius:5px;transition:width .3s var(--ease)}
.opt{border:1.5px solid var(--line);border-radius:14px;padding:15px;margin-bottom:10px;display:flex;align-items:center;gap:12px;font-weight:500;font-size:15px;transition:.15s;background:#fff}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--brand);background:var(--tint)}
.opt .e{width:38px;height:38px;border-radius:10px;background:var(--tint);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt .e .ic{width:20px;height:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px}
.field input,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:var(--text)}
.field input:focus,.field textarea:focus{border-color:var(--brand)}
.convitem{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.convitem .meta{flex:1;min-width:0}
.convitem .nm{font-family:'Inter Tight';font-weight:700;font-size:14.5px}
.convitem .prev{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge-n{background:var(--brand);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px}
.msgs{display:flex;flex-direction:column;gap:8px;padding:16px 16px 8px}
.bub{max-width:76%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.4}
.bub.them{background:var(--mist);align-self:flex-start;border-bottom-left-radius:5px}
.bub.me{background:var(--ink);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.bub.sys{align-self:center;background:var(--tint);color:var(--brand);font-size:12px;font-weight:600;border-radius:10px;text-align:center;display:inline-flex;gap:6px;align-items:center}
.bub.sys .ic{width:14px;height:14px}
.chatbar{position:absolute;bottom:0;left:0;right:0;display:flex;gap:8px;padding:12px 14px;background:#fff;border-top:1px solid var(--line);align-items:center}
.chatbar input{flex:1;border:1.5px solid var(--line);border-radius:999px;padding:11px 16px;font-size:14px;outline:none;font-family:inherit}
.chatbar .send{width:42px;height:42px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chatbar .send .ic{width:18px;height:18px}
.safebanner{background:#FFF8E6;color:#8a6d00;font-size:12px;padding:8px 16px;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.safebanner .ic{width:14px;height:14px}
.walletbox{background:linear-gradient(135deg,var(--brand),#ff7a40);border-radius:22px;padding:22px;color:#fff;margin-bottom:16px}
.walletbox .lbl{font-size:13px;opacity:.9}
.walletbox .v{font-family:'Inter Tight';font-weight:800;font-size:34px;margin:2px 0 4px}
.walletbox .pend{font-size:12px;opacity:.85}
.wact{display:flex;gap:10px;margin:16px 0}
.wact button{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink)}
.wact button .ic{width:20px;height:20px;color:var(--brand)}
.tx{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.tx .ic-box{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--mist);color:var(--ink)}
.tx .ic-box .ic{width:18px;height:18px}
.tx .meta{flex:1}
.tx .amt{font-family:'Inter Tight';font-weight:700;font-size:15px}
.tx .amt.in{color:var(--ok)}.tx .amt.out{color:var(--text)}
.setgrp{margin-bottom:22px}
.setgrp .h{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px 4px}
.setitem{display:flex;align-items:center;gap:14px;padding:14px;background:#fff;border:1px solid var(--line);border-bottom:0;font-size:15px;font-weight:500}
.setgrp .setitem:first-child{border-radius:14px 14px 0 0}
.setgrp .setitem:last-child{border-radius:0 0 14px 14px;border-bottom:1px solid var(--line)}
.setitem .e{width:34px;height:34px;border-radius:10px;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ink)}
.setitem .e .ic{width:17px;height:17px}
.setitem .arr{margin-left:auto;color:var(--muted);display:flex}
.setitem .arr .ic{width:18px;height:18px}
.switch{margin-left:auto;width:44px;height:26px;border-radius:999px;background:var(--brand);position:relative;flex-shrink:0}
.switch::after{content:"";position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:#fff}
.toast{position:absolute;bottom:90px;left:20px;right:20px;background:var(--ink);color:#fff;padding:13px 16px;border-radius:13px;font-size:14px;text-align:center;z-index:50;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;box-shadow:0 14px 30px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:none}
.success{text-align:center;padding:60px 24px}
.success .big{width:90px;height:90px;border-radius:50%;background:var(--tint);color:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
.success .big .ic{width:46px;height:46px}
.success h2{font-size:24px;margin-bottom:10px}.success p{color:var(--muted);margin-bottom:28px}
.portfolio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pf{aspect-ratio:1;border-radius:14px;background:linear-gradient(135deg,var(--tint),#ffd9c9);display:flex;align-items:center;justify-content:center;color:var(--brand)}
.pf .ic{width:30px;height:30px}
.demo-pill{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 10px;border-radius:999px;z-index:200;font-weight:600;letter-spacing:.04em}
@media(min-width:480px){.demo-pill{top:14px}}
</style>
</head>
<body>
<div class="demo-pill">PROTÓTIPO · dados de exemplo</div>
<div class="phone">
  <div id="statusbar" class="statusbar"><span>9:41</span><span style="display:flex;gap:6px"></span></div>
  <div id="screen" class="screen"></div>
  <nav id="botnav" class="botnav"></nav>
</div>
<div id="toast" class="toast"></div>

<script>

const S={mode:'contratar',screen:'home',stack:[],params:{}};

function go(screen,params,push){params=params||{};if(push!==false&&S.screen)S.stack.push({screen:S.screen,params:S.params});S.screen=screen;S.params=params;rend();elScreen.scrollTop=0;}
function back(){var p=S.stack.pop();if(p){S.screen=p.screen;S.params=p.params;rend();}else go('home',{},false);}
function setMode(m){S.mode=m;go('home',{},false);}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2200);}

function rend(){
  var dark=S.screen==='home'&&S.mode==='contratar';
  elStatus.className='statusbar'+(dark?' dark':'');
  elStatus.querySelector('span:last-child').innerHTML=ic('signal')+ic('battery');
  var fn=SCREENS[S.screen]||SCREENS.home;
  elScreen.className='screen'+(S.screen==='chat'?' noscroll':'');
  elScreen.innerHTML=fn(S.params);
  rendNav();bind();
}
function rendNav(){
  var hide=['request','chat'].indexOf(S.screen)>=0;
  elNav.style.display=hide?'none':'flex';
  if(hide)return;
  var isWork=S.mode==='trabalhar';
  var items=isWork?[{id:'home',ic:'home',l:'Início'},{id:'feed',ic:'bolt',l:'Oportunidades'},{fab:1},{id:'chats',ic:'chat',l:'Mensagens'},{id:'wallet',ic:'wallet',l:'Carteira'}]

  if(w.type==='form')body='<div class="field"><label>Descreva o que precisa</label><textarea rows="4" placeholder="Ex.: montar 1 guarda-roupa de 6 portas"></textarea></div><div class="field"><label>Adicionar fotos (opcional)</label><div class="opt" style="justify-content:center;color:var(--muted)">'+ic('camera','width:20px;height:20px')+' Tirar ou enviar foto</div></div>';
  if(w.type==='loc')body='<div style="height:160px;border-radius:14px;background:linear-gradient(135deg,#dfe7ff,#eef2ff);display:flex;align-items:center;justify-content:center;color:var(--blue);margin-bottom:14px">'+ic('pin','width:40px;height:40px')+'</div><div class="field"><label>Endereço</label><input value="Rua das Flores, 123, Itapema/SC"></div><div class="sm muted" style="display:flex;gap:6px;align-items:center">'+ic('lock')+' Seu endereço exato só é liberado após a contratação.</div>';
  return '<div class="topbar"><div class="back" data-act="wizback">'+ic('chevronL')+'</div><h2>Pedir serviço</h2><div class="act" data-nav="home">'+ic('close')+'</div></div>'+
   '<div class="pad"><div class="progress"><i style="width:'+pct+'%"></i></div><h2 style="font-size:22px;margin-bottom:18px">'+w.q+'</h2>'+body+'</div>'+
   '<div class="pad" style="position:absolute;bottom:16px;left:0;right:0"><button class="btn btn-pri" data-act="wiznext">'+(step===WIZ.length-1?'Publicar pedido':'Continuar')+'</button></div>';
};
function wizSuccess(){return '<div class="success"><div class="big">'+ic('check')+'</div><h2>Pedido publicado!</h2><p>Profissionais perto de você já estão recebendo seu pedido. As primeiras propostas costumam chegar em poucos minutos.</p><button class="btn btn-pri" data-nav="proposals">Ver propostas recebidas</button><button class="btn btn-out" style="margin-top:10px" data-nav="home">Voltar ao início</button></div>';}

   PROVIDERS.slice(0,3).map(function(p,i){return '<div class="card" style="margin-bottom:12px" data-prov="'+p.id+'"><div class="row" style="gap:12px;margin-bottom:10px"><div class="av sm '+p.av+'">'+p.ini+'</div><div style="flex:1"><div class="nm dp b">'+p.name+' '+vbadge()+'</div><div class="sm" style="display:flex;align-items:center;gap:4px">'+star1('var(--star)')+' '+p.rating.toFixed(1)+' <span class="muted">('+p.reviews+')</span></div></div><div style="text-align:right"><b class="dp" style="font-size:18px;color:var(--brand)">'+prices[i]+'</b><div class="xs muted">'+times[i]+'</div></div></div><p class="sm muted" style="margin-bottom:12px">'+msgs[i]+'</p><div class="row" style="gap:8px"><button class="btn btn-out btn-sm" style="flex:1" data-act="openchat">Conversar</button><button class="btn btn-pri btn-sm" style="flex:1" data-act="hire">Contratar</button></div></div>';}).join('')+'</div>';
};

SCREENS.feed=function(){return '<div class="topbar"><h2>Oportunidades</h2><div class="act">'+ic('gear')+'</div></div><div class="pad"><div class="row" style="gap:8px;overflow-x:auto;padding-bottom:14px"><span class="chip">'+ic('pin')+' 5 km</span><span class="chip gray">Todas categorias</span><span class="chip gray">Hoje</span><span class="chip gray">'+ic('dollar')+'</span></div>'+OPPS.map(oppCard).join('')+'</div>';};

SCREENS.chats=function(){return '<div class="topbar"><h2>Mensagens</h2><div class="act">'+ic('search')+'</div></div><div class="pad">'+
  CHATS.map(function(c){return '<div class="convitem" data-chat="'+c.id+'"><div class="av md '+c.av+'">'+c.ini+'</div><div class="meta"><div class="row between"><div class="nm">'+c.name+'</div><span class="xs muted">'+(c.unread?'':'9:32')+'</span></div><div class="row between"><div class="prev">'+c.msgs[c.msgs.length-1].b+'</div>'+(c.unread?'<span class="badge-n">'+c.unread+'</span>':'')+'</div><span class="chip gray xs" style="margin-top:5px">'+c.status+'</span></div></div>';}).join('')+'</div>';};

SCREENS.chat=function(p){
  var c=CHATS.filter(function(x){return x.id==p.id;})[0]||CHATS[0];
  return '<div class="topbar"><div class="back" data-back>'+ic('chevronL')+'</div><div class="av sm '+c.av+'">'+c.ini+'</div><div style="flex:1"><div class="dp b" style="font-size:15px;display:flex;align-items:center;gap:5px">'+c.name+' '+vbadge()+'</div><div class="xs muted">online agora</div></div></div>'+
   '<div class="safebanner">'+ic('lock')+' Mantenha pagamento e conversa no Leblon. Não compartilhe telefone.</div>'+
   '<div class="msgs" id="msgs">'+c.msgs.map(function(m){return '<div class="bub '+m.t+'">'+m.b+'</div>';}).join('')+'</div>'+
   '<div class="chatbar"><button class="act" style="background:var(--mist);width:42px;height:42px;border-radius:50%;color:var(--ink)">'+ic('plus')+'</button><input id="chatinput" placeholder="Mensagem"><button class="send" data-act="sendmsg" data-cid="'+c.id+'">'+ic('send')+'</button></div>';
};

  '<div class="walletbox"><div class="lbl">Saldo disponível</div><div class="v">R$ 1.847,50</div><div class="pend">Mais R$ 120,00 a liberar, em garantia</div></div>'+
  '<div class="wact"><button data-act="toast">'+ic('download')+'Sacar Pix</button><button data-act="toast">'+ic('bolt')+'Antecipar</button><button data-act="toast">'+ic('chart')+'Extrato</button></div>'+
  '<div class="sec-title">Transações</div>'+TXS.map(function(t){return '<div class="tx"><div class="ic-box">'+ic(t.ic)+'</div><div class="meta"><div class="b sm dp">'+t.t+'</div><div class="xs muted">'+t.d+'</div></div><div class="amt '+(t.in?'in':'out')+'" style="'+(t.pend?'color:var(--muted)':'')+'">'+t.a+'</div></div>';}).join('')+'</div>';};

SCREENS.account=function(){return '<div class="topbar"><h2>Conta</h2><div class="act">'+ic('bell')+'</div></div><div class="pad">'+
  '<div class="row" style="gap:14px;margin-bottom:20px"><div class="av lg">L</div><div style="flex:1"><div class="dp b" style="font-size:19px">Leonardo Franco</div><div class="sm muted">Itapema, SC · membro desde 2026</div><span class="chip" style="margin-top:6px">'+ic('check')+' Identidade verificada</span></div></div>'+
  '<div class="setgrp"><div class="h">Conta</div>'+
   [["user","Dados pessoais"],["pin","Endereços"],["card","Pagamento e Pix"],["idcard","Verificação"]].map(function(x){return '<div class="setitem"><span class="e">'+ic(x[0])+'</span>'+x[1]+'<span class="arr">'+ic('chevronR')+'</span></div>';}).join('')+'</div>'+
  '<div class="setgrp"><div class="h">Modo prestador</div>'+
   '<div class="setitem"><span class="e">'+ic('bolt')+'</span>Ativar perfil de prestador<span class="switch"></span></div>'+
   '<div class="setitem"><span class="e">'+ic('book')+'</span>Minhas categorias<span class="arr">'+ic('chevronR')+'</span></div>'+
   '<div class="setitem"><span class="e">'+ic('calendar')+'</span>Disponibilidade<span class="arr">'+ic('chevronR')+'</span></div></div>'+
  '<div class="setgrp"><div class="h">Preferências</div>'+
   '<div class="setitem"><span class="e">'+ic('bell')+'</span>Notificações<span class="arr">'+ic('chevronR')+'</span></div>'+
   '<div class="setitem"><span class="e">'+ic('lock')+'</span>Privacidade e segurança<span class="arr">'+ic('chevronR')+'</span></div>'+
   '<div class="setitem"><span class="e">'+ic('chat')+'</span>Ajuda e suporte<span class="arr">'+ic('chevronR')+'</span></div></div>'+

/* EVENTOS */
function bind(){
  elScreen.querySelectorAll('[data-nav]').forEach(function(e){e.onclick=function(){go(e.getAttribute('data-nav'));};});
  elScreen.querySelectorAll('[data-back]').forEach(function(e){e.onclick=back;});
  elScreen.querySelectorAll('[data-mode]').forEach(function(e){e.onclick=function(){setMode(e.getAttribute('data-mode'));};});
  elScreen.querySelectorAll('[data-cat]').forEach(function(e){e.onclick=function(){go('search',{cat:e.getAttribute('data-cat')});};});
  elScreen.querySelectorAll('[data-prov]').forEach(function(e){e.onclick=function(ev){if(ev.target.closest('[data-act]'))return;go('profile',{id:e.getAttribute('data-prov')});};});
  elScreen.querySelectorAll('[data-tab]').forEach(function(e){e.onclick=function(){go('profile',Object.assign({},S.params,{tab:e.getAttribute('data-tab')}),false);};});
  elScreen.querySelectorAll('[data-chat]').forEach(function(e){e.onclick=function(){go('chat',{id:e.getAttribute('data-chat')});};});
  elScreen.querySelectorAll('[data-sel]').forEach(function(e){e.onclick=function(){go('request',Object.assign({},S.params,{sel:+e.getAttribute('data-sel')}),false);};});
  elScreen.querySelectorAll('[data-act]').forEach(function(e){e.onclick=function(ev){ev.stopPropagation();act(e.getAttribute('data-act'),e);};});
}
elNav.onclick=function(ev){var n=ev.target.closest('[data-nav]');var a=ev.target.closest('[data-act]');if(n)go(n.getAttribute('data-nav'));else if(a)act(a.getAttribute('data-act'));};
function act(a,el){
  switch(a){
    case 'request':go('request',{step:0});break;
    case 'wiznext':go('request',{step:(S.params.step||0)+1},false);break;
    case 'wizback':var st=(S.params.step||0)-1;if(st<0)back();else go('request',{step:st},false);break;
    case 'propose':toast('Proposta enviada! Você será avisado se for aceita.');break;
    case 'openchat':go('chat',{id:1});break;
    case 'hire':go('chat',{id:2});toast('Pagamento protegido ativado.');break;
    case 'sendmsg':sendMsg(el.getAttribute('data-cid'));break;
    case 'feed':go('feed');break;
    case 'toast':toast('Disponível no app completo.');break;
  }
}
function sendMsg(cid){var inp=document.getElementById('chatinput');if(!inp||!inp.value.trim())return;var c=CHATS.filter(function(x){return x.id==cid;})[0]||CHATS[0];c.msgs.push({t:'me',b:inp.value.trim()});setTimeout(function(){c.msgs.push({t:'them',b:'Perfeito, combinado!'});if(S.screen==='chat')rend();},900);rend();}

rend();
</script>
